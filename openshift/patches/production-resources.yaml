# Production resource limits
# Apply with: kustomize build --load-restrictor LoadRestrictionsNone overlays/production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sliples-backend
  namespace: sliples
spec:
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sliples-worker
  namespace: sliples
spec:
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sliples-postgres
  namespace: sliples
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sliples-browser-chrome
  namespace: sliples
spec:
  template:
    spec:
      containers:
        - name: playwright
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sliples-browser-firefox
  namespace: sliples
spec:
  template:
    spec:
      containers:
        - name: playwright
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
