apiVersion: v1
kind: ConfigMap
metadata:
  name: sliples-backend-config
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: backend
data:
  # Redis
  REDIS_URL: "redis://sliples-redis-svc:6379/0"
  # S3/MinIO
  S3_ENDPOINT: "http://sliples-minio-svc:9000"
  S3_BUCKET: "sliples-screenshots"
  # JWT Settings
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRY_HOURS: "24"
  # CORS
  ALLOWED_ORIGINS: "https://sliples.apps.example.com"
  # Frontend URL for redirects
  FRONTEND_URL: "https://sliples.apps.example.com"
  # Google Workspace (optional)
  ALLOWED_WORKSPACE_DOMAINS: "example.com"
  GOOGLE_REDIRECT_URI: "https://api.sliples.apps.example.com/api/v1/auth/google/callback"
  # Browser containers (internal service URLs)
  BROWSER_CHROME_URL: "ws://sliples-browser-chrome-svc:3000"
  BROWSER_FIREFOX_URL: "ws://sliples-browser-firefox-svc:3000"
