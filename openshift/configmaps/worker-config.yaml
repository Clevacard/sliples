apiVersion: v1
kind: ConfigMap
metadata:
  name: sliples-worker-config
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: worker
data:
  # Redis
  REDIS_URL: "redis://redis:6379/0"
  # S3/MinIO
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "sliples-screenshots"
  # Browser containers
  BROWSER_CHROME_URL: "ws://browser-chrome:3000"
  BROWSER_FIREFOX_URL: "ws://browser-firefox:3000"
  # Worker settings
  CELERY_CONCURRENCY: "4"
