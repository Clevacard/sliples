---
# Database Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: sliples-db-credentials
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "sliples"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_DB: "sliples"
  DATABASE_URL: "postgresql://sliples:CHANGE_ME_IN_PRODUCTION@sliples-postgres-svc:5432/sliples"
---
# S3/MinIO Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: sliples-s3-credentials
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: storage
type: Opaque
stringData:
  S3_ACCESS_KEY: "CHANGE_ME_IN_PRODUCTION"
  S3_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  MINIO_ROOT_USER: "CHANGE_ME_IN_PRODUCTION"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
---
# SMTP Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: sliples-smtp-credentials
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: email
type: Opaque
stringData:
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "CHANGE_ME_IN_PRODUCTION"
  SMTP_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  EMAIL_FROM: "sliples@example.com"
---
# Application Secrets
apiVersion: v1
kind: Secret
metadata:
  name: sliples-app-secrets
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_USE_SECURE_RANDOM_STRING"
  JWT_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_USE_SECURE_RANDOM_STRING"
---
# Google OAuth2 Credentials (optional)
apiVersion: v1
kind: Secret
metadata:
  name: sliples-google-oauth
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: "CHANGE_ME_IF_USING_GOOGLE_AUTH"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME_IF_USING_GOOGLE_AUTH"
---
# Test Environment Credentials (for test runners)
apiVersion: v1
kind: Secret
metadata:
  name: sliples-test-env-credentials
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: worker
type: Opaque
stringData:
  TEST_USERNAME: "CHANGE_ME_IN_PRODUCTION"
  TEST_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
