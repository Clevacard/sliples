apiVersion: apps/v1
kind: Deployment
metadata:
  name: sliples-browser-chrome
  namespace: sliples
  labels:
    app.kubernetes.io/name: sliples
    app.kubernetes.io/component: browser-chrome
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sliples
      app.kubernetes.io/component: browser-chrome
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sliples
        app.kubernetes.io/component: browser-chrome
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: playwright
          image: mcr.microsoft.com/playwright:v1.58.0-jammy
          imagePullPolicy: IfNotPresent
          command:
            - npx
            - playwright
            - run-server
            - --port=3000
          ports:
            - name: ws
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
